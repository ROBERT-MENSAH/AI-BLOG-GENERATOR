    <!-- Tailwind CSS CDN: utility classes like `focus:ring` and `hover:bg-blue-700` are provided here -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
     rel="stylesheet">
</head>
<!-- Page body: gray background, sans font, and antialiasing for nicer text -->
<body class="flex flex-col min-h-screen bg-gray-100 font-sans antialiased">
    <!-- Navbar -->

        <div>

        </div>

            <a href="signup.html" class="text-white hover:underline">SignUp</a>
        </div>
    </nav>


    <!-- main content -->
     <div class="flex-grow">
        
        <!-- Centering form vertically/horizontally with `flex` and `h-screen` to fill viewport height -->
        <div class="flex justify-center items-center h-screen">
            <!-- Form card: `max-w-sm` constrains width, `focus:ring` on inputs improves accessibility -->
            <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="block text-gray-700">Username</label>
                        <!-- Input utilities:
                            - `w-full` full width inside container
                            - `p-2` padding and `border-gray-300` for subtle outline
                            - `focus:ring` and `focus:border-blue-300` add a blue focus ring for keyboard users
                        -->
                        <input type="text" id="username" name="username" required placeholder="Enter your username"
                            class="w-full p-2 border border-gray-300 rounded mt-1 focus:outline-none focus:ring focus:border-blue-300">
                    </div>
                    <div class="mb-6">
                        <label for="password" class="block text-gray-700">Password</label>
                        <!-- Password input: same utilities as username input; `hover:border-blue-400` gives visual feedback on hover -->
                        <input type="password" id="password" name="password" required placeholder="Enter your password"
                            class="w-full p-2 border border-gray-300 rounded mt-1 focus:outline-none focus:ring focus:border-blue-300 hover:border-blue-400">
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition-colors">Login</button>
                </form>
            </div>
                </div>
