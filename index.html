<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BLOG GENERATOR</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
     rel="stylesheet">
     <style>
        @keyframes rotate {
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }

         @-webkit-keyframes rotate {
            from{
                -webkit-transform: rotate(0deg);
            }
            to{
                -webkit-transform: rotate(360deg);
            }
        }

        .loading-circle{
            width:100px;
            height:100px;
            margin:110px auto 0;
            border:16px solid #b712ac;
            border-radius:50%;
            border-right-color:transparent;
            border-bottom-color:transparent;
            -webkit-transition:all 0.5s ease-in;
            -webkit-animation-name:       rotate;
            -webkit-animation-duration:   1s;
            -webkit-animation-iteration-count:infinite;
            -webkit-animation-timing-function:linear;

                transition:all 0.5s ease-in;
                animation-name:       rotate;
                animation-duration:   1s;
                animation-iteration-count:infinite; 
                animation-timing-function:linear;

        }
        </style>
</head>

<body class="flex flex-col min-h-screen bg-gray-100 font-sans antialiased">
<!-- Navbar -->
    <nav class=" bg-blue-600 p-4 text-white flex justify-between">
        <div>
            <h1 class="text-3xl font-bold">AI BLOG GENERATOR</h1>
        </div>
        <div>
            <a href="#" class="text-white hover:underline">Logout</a>
        </div>
    </nav>

     <br>
    <br>
 <!-- Main -->
    <div class="flex-grow container mx-auto mt-10 px-4 sm:px-0">
        <div class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md transition-transform transform hover:scale-105 flex flex-col">
        <!--INTRODUCTION SECTION-->

            <div class="text-center">
                <h2 class="text-2xl font-semibold mb-4">Welcome to the AI BLOG GENERATOR</h2>
                <p class="text-gray-700">
            Generate high-quality blog articles from Youtube videos using AI. Simply input the YouTube video URL, and our AI will create a well-structured blog post for you.
                </p>
            </div>
            <br>
        <!--YOUTUBE SECTION-->
        <div>
            <h2 class="text-xl mb-4 font-semibold ">Enter YouTube Video link</h2> 
       <div class="flex space-x-4">
        <input type="text" id="youtubelink" type="url" placeholder="Paste YouTube Link..." class="flex-grow p-2 border border-blue-400 rounded-md">
        <button id="generateBlogbutton" class="bg-blue-600 text-white px-4 py-2 rounded-r-md hover:bg-blue-700 transition-colors">Generate</button>
       </div>
    </div>

    <!--Section for loading circle-->
    <div style="display: none;" id="loading-circle" class="loading-circle"></div>


    <!---GENERATED BLOG DISPLAY SECTION--->
    <section class="mt-10 flex-grow">
        <h2 class="text-xl mb-4 font-semibold">Generated Blog Article</h2>
        <div id="blogContent" class="mt-2 text-gray-700 space-y-4 p-4 border border-gray-300 rounded-md">
       
        </div>
    </section>
  </div>
  <footer class="bg-gray-800 text-white p-4 text-center">
    Powered by <a href="https://openai.com" class="text-blue-400 hover:underline">OpenAI</a>
  </footer>
</body>

</html>
